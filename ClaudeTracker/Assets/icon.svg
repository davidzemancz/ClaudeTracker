<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4845A"/>
      <stop offset="100%" style="stop-color:#C06830"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0E0D6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle inner shadow -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>

  <!-- Gauge arc background (track) -->
  <path d="M 148 356 A 140 140 0 1 1 364 356"
        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="32" stroke-linecap="round"/>

  <!-- Gauge arc foreground (~65% fill) -->
  <path d="M 148 356 A 140 140 0 1 1 338 310"
        fill="none" stroke="url(#ring)" stroke-width="32" stroke-linecap="round"/>

  <!-- Gauge tick marks -->
  <line x1="148" y1="356" x2="148" y2="340" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  <line x1="364" y1="356" x2="364" y2="340" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>

  <!-- Center percentage text -->
  <text x="256" y="270" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="80" fill="white" letter-spacing="-2">CT</text>

  <!-- Small label -->
  <text x="256" y="310" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="28" fill="rgba(255,255,255,0.75)">TRACKER</text>

  <!-- Gauge needle dot -->
  <circle cx="338" cy="310" r="10" fill="white"/>
</svg>
